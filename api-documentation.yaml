openapi: 3.0.3
info:
  title: Minimalist E-commerce API
  description: |
    A comprehensive REST API for a minimalist e-commerce platform specializing in essential clothing items.
    
    This API supports both authenticated users and guest checkout functionality, allowing customers to 
    browse products, manage their cart, and complete purchases without requiring account creation.
    
    ## Key Features
    - Product catalog management
    - Shopping cart operations
    - Guest and authenticated checkout
    - User authentication and profile management
    - Order tracking and history
    - Review and rating system
    
    ## Authentication
    The API uses JWT (JSON Web Tokens) for authentication. Include the token in the Authorization header:
    `Authorization: Bearer <your-jwt-token>`
    
    ## Guest Checkout
    Customers can complete purchases without creating an account by using the guest checkout endpoints.
    Guest orders are associated with the provided email address for future reference.
  version: 1.0.0
  contact:
    name: Minimalist E-commerce Support
    email: api@minimal.com
    url: https://minimal.com/support
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: https://api.minimal.com/v1
    description: Production server
  - url: https://staging-api.minimal.com/v1
    description: Staging server
  - url: http://localhost:3001/api
    description: Development server

security:
  - BearerAuth: []
  - {}

paths:
  # Products API
  /products:
    get:
      tags:
        - Products
      summary: Get all products
      description: |
        Retrieve a paginated list of products with optional filtering and search capabilities.
        Supports filtering by category, price range, availability, and text search.
      parameters:
        - name: page
          in: query
          description: Page number for pagination
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          description: Number of items per page
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
        - name: category
          in: query
          description: Filter by product category
          required: false
          schema:
            type: string
            example: clothing
        - name: search
          in: query
          description: Search term for product name or description
          required: false
          schema:
            type: string
            example: black t-shirt
        - name: minPrice
          in: query
          description: Minimum price filter
          required: false
          schema:
            type: number
            minimum: 0
        - name: maxPrice
          in: query
          description: Maximum price filter
          required: false
          schema:
            type: number
            minimum: 0
        - name: inStock
          in: query
          description: Filter by availability
          required: false
          schema:
            type: boolean
        - name: sortBy
          in: query
          description: Sort products by field
          required: false
          schema:
            type: string
            enum: [name, price, rating, createdAt]
            default: createdAt
        - name: sortOrder
          in: query
          description: Sort order
          required: false
          schema:
            type: string
            enum: [asc, desc]
            default: desc
      responses:
        '200':
          description: Products retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  products:
                    type: array
                    items:
                      $ref: '#/components/schemas/Product'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /products/{id}:
    get:
      tags:
        - Products
      summary: Get product by ID
      description: Retrieve detailed information about a specific product including inventory levels and specifications.
      parameters:
        - name: id
          in: path
          required: true
          description: Product ID
          schema:
            type: string
            example: black-tshirt
      responses:
        '200':
          description: Product retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /products/{id}/reviews:
    get:
      tags:
        - Products
      summary: Get product reviews
      description: Retrieve reviews and ratings for a specific product with pagination and filtering options.
      parameters:
        - name: id
          in: path
          required: true
          description: Product ID
          schema:
            type: string
        - name: page
          in: query
          description: Page number for pagination
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          description: Number of reviews per page
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 10
        - name: rating
          in: query
          description: Filter by rating
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 5
        - name: verified
          in: query
          description: Filter by verified purchases only
          required: false
          schema:
            type: boolean
      responses:
        '200':
          description: Reviews retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  reviews:
                    type: array
                    items:
                      $ref: '#/components/schemas/Review'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
                  summary:
                    $ref: '#/components/schemas/ReviewSummary'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    post:
      tags:
        - Products
      summary: Add product review
      description: Add a review and rating for a product. Requires authentication and verified purchase.
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Product ID
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - rating
                - title
                - comment
              properties:
                rating:
                  type: integer
                  minimum: 1
                  maximum: 5
                  description: Rating from 1 to 5 stars
                title:
                  type: string
                  maxLength: 100
                  description: Review title
                comment:
                  type: string
                  maxLength: 1000
                  description: Review comment
      responses:
        '201':
          description: Review added successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Review'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: User has not purchased this product
        '409':
          description: User has already reviewed this product
        '500':
          $ref: '#/components/responses/InternalServerError'

  # Cart API
  /cart:
    get:
      tags:
        - Cart
      summary: Get current user's cart
      description: Retrieve the current user's shopping cart with all items and calculated totals.
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Cart retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cart'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

    delete:
      tags:
        - Cart
      summary: Clear cart
      description: Remove all items from the current user's cart.
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Cart cleared successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cart'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /cart/items:
    post:
      tags:
        - Cart
      summary: Add item to cart
      description: Add a product with specified size and quantity to the user's cart.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - productId
                - size
                - quantity
              properties:
                productId:
                  type: string
                  description: Product ID to add
                  example: black-tshirt
                size:
                  type: string
                  description: Selected size
                  example: M
                quantity:
                  type: integer
                  minimum: 1
                  description: Quantity to add
                  example: 1
      responses:
        '200':
          description: Item added to cart successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cart'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Product not found or size not available
        '409':
          description: Insufficient inventory
        '500':
          $ref: '#/components/responses/InternalServerError'

  /cart/items/{itemId}:
    put:
      tags:
        - Cart
      summary: Update cart item quantity
      description: Update the quantity of a specific item in the cart.
      security:
        - BearerAuth: []
      parameters:
        - name: itemId
          in: path
          required: true
          description: Cart item ID
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - quantity
              properties:
                quantity:
                  type: integer
                  minimum: 1
                  description: New quantity
      responses:
        '200':
          description: Cart item updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cart'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Cart item not found
        '409':
          description: Insufficient inventory
        '500':
          $ref: '#/components/responses/InternalServerError'

    delete:
      tags:
        - Cart
      summary: Remove item from cart
      description: Remove a specific item from the user's cart.
      security:
        - BearerAuth: []
      parameters:
        - name: itemId
          in: path
          required: true
          description: Cart item ID
          schema:
            type: string
      responses:
        '200':
          description: Item removed from cart successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cart'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Cart item not found
        '500':
          $ref: '#/components/responses/InternalServerError'

  /cart/coupon:
    post:
      tags:
        - Cart
      summary: Apply coupon to cart
      description: Apply a discount coupon to the current cart.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - code
              properties:
                code:
                  type: string
                  description: Coupon code
                  example: SAVE10
      responses:
        '200':
          description: Coupon applied successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cart'
        '400':
          description: Invalid or expired coupon
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          description: Coupon already applied or not applicable
        '500':
          $ref: '#/components/responses/InternalServerError'

    delete:
      tags:
        - Cart
      summary: Remove coupon from cart
      description: Remove the applied coupon from the current cart.
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Coupon removed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cart'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /cart/shipping-options:
    post:
      tags:
        - Cart
      summary: Get shipping options
      description: Calculate available shipping options and costs for the current cart and destination.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Address'
      responses:
        '200':
          description: Shipping options calculated successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ShippingOption'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'



  # Checkout API
  /checkout:
    post:
      tags:
        - Checkout
      summary: Process authenticated user checkout
      description: |
        Process checkout for authenticated users. This endpoint handles the complete checkout process
        including payment processing, order creation, and inventory updates.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - shippingAddress
                - paymentMethod
                - shippingOption
              properties:
                shippingAddress:
                  $ref: '#/components/schemas/Address'
                billingAddress:
                  $ref: '#/components/schemas/Address'
                  description: Billing address (optional, defaults to shipping address)
                paymentMethod:
                  $ref: '#/components/schemas/PaymentMethod'
                shippingOption:
                  type: string
                  description: Selected shipping option ID
                  example: standard
                notes:
                  type: string
                  maxLength: 500
                  description: Special delivery instructions
      responses:
        '201':
          description: Order created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '402':
          description: Payment failed
        '409':
          description: Inventory insufficient
        '500':
          $ref: '#/components/responses/InternalServerError'

  /guest-checkout:
    post:
      tags:
        - Checkout
      summary: Process guest checkout
      description: |
        Process checkout for guest users without requiring account creation. The order will be
        associated with the provided email address for tracking and future reference.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - shippingAddress
                - paymentMethod
                - shippingOption
                - items
              properties:
                email:
                  type: string
                  format: email
                  description: Guest email for order confirmation
                  example: guest@example.com
                shippingAddress:
                  $ref: '#/components/schemas/Address'
                billingAddress:
                  $ref: '#/components/schemas/Address'
                  description: Billing address (optional, defaults to shipping address)
                paymentMethod:
                  $ref: '#/components/schemas/PaymentMethod'
                shippingOption:
                  type: string
                  description: Selected shipping option ID
                  example: standard
                items:
                  type: array
                  items:
                    $ref: '#/components/schemas/CartItem'
                  description: Cart items for guest checkout
                createAccount:
                  type: boolean
                  default: false
                  description: Whether to create an account after successful order
                password:
                  type: string
                  description: Password for account creation (required if createAccount is true)
                notes:
                  type: string
                  maxLength: 500
                  description: Special delivery instructions
      responses:
        '201':
          description: Guest order created successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Order'
                  - type: object
                    properties:
                      guestOrder:
                        type: boolean
                        example: true
                      accountCreated:
                        type: boolean
                        description: Whether account was created
        '400':
          $ref: '#/components/responses/BadRequest'
        '402':
          description: Payment failed
        '409':
          description: Inventory insufficient or email already exists (if createAccount is true)
        '500':
          $ref: '#/components/responses/InternalServerError'

  # Authentication API
  /auth/login:
    post:
      tags:
        - Authentication
      summary: User login
      description: Authenticate user with email and password, returning JWT token and user information.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                  example: user@example.com
                password:
                  type: string
                  format: password
                  example: securePassword123
                rememberMe:
                  type: boolean
                  default: false
                  description: Whether to extend token expiration
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  token:
                    type: string
                    description: JWT authentication token
                    example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                  user:
                    $ref: '#/components/schemas/User'
                  expiresIn:
                    type: integer
                    description: Token expiration time in seconds
                    example: 3600
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          description: Invalid credentials
        '423':
          description: Account locked due to too many failed attempts
        '500':
          $ref: '#/components/responses/InternalServerError'

  /auth/register:
    post:
      tags:
        - Authentication
      summary: User registration
      description: Register a new user account with email verification.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
                - firstName
                - lastName
              properties:
                email:
                  type: string
                  format: email
                  example: newuser@example.com
                password:
                  type: string
                  format: password
                  minLength: 8
                  example: securePassword123
                firstName:
                  type: string
                  maxLength: 50
                  example: John
                lastName:
                  type: string
                  maxLength: 50
                  example: Doe
                acceptTerms:
                  type: boolean
                  description: User acceptance of terms and conditions
                  example: true
                marketingOptIn:
                  type: boolean
                  default: false
                  description: Opt-in for marketing communications
      responses:
        '201':
          description: Registration successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  token:
                    type: string
                    description: JWT authentication token
                  user:
                    $ref: '#/components/schemas/User'
                  message:
                    type: string
                    example: Registration successful. Please check your email to verify your account.
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: Email already exists
        '500':
          $ref: '#/components/responses/InternalServerError'

  /auth/logout:
    post:
      tags:
        - Authentication
      summary: User logout
      description: Logout user and invalidate the current JWT token.
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Logout successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Logged out successfully
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /auth/me:
    get:
      tags:
        - Authentication
      summary: Get current user profile
      description: Retrieve the current authenticated user's profile information.
      security:
        - BearerAuth: []
      responses:
        '200':
          description: User profile retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

    put:
      tags:
        - Authentication
      summary: Update user profile
      description: Update the current user's profile information.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                firstName:
                  type: string
                  maxLength: 50
                lastName:
                  type: string
                  maxLength: 50
                phone:
                  type: string
                  maxLength: 20
                dateOfBirth:
                  type: string
                  format: date
                marketingOptIn:
                  type: boolean
      responses:
        '200':
          description: Profile updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  user:
                    $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /auth/password:
    put:
      tags:
        - Authentication
      summary: Change password
      description: Change the current user's password.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - currentPassword
                - newPassword
              properties:
                currentPassword:
                  type: string
                  format: password
                newPassword:
                  type: string
                  format: password
                  minLength: 8
      responses:
        '200':
          description: Password changed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Password changed successfully
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          description: Current password is incorrect
        '500':
          $ref: '#/components/responses/InternalServerError'

  /auth/password-reset:
    post:
      tags:
        - Authentication
      summary: Request password reset
      description: Send password reset email to the user.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
              properties:
                email:
                  type: string
                  format: email
                  example: user@example.com
      responses:
        '200':
          description: Password reset email sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Password reset email sent if account exists
        '400':
          $ref: '#/components/responses/BadRequest'
        '429':
          description: Too many reset requests
        '500':
          $ref: '#/components/responses/InternalServerError'

  /auth/password-reset/confirm:
    post:
      tags:
        - Authentication
      summary: Confirm password reset
      description: Reset password using the token from email.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - token
                - newPassword
              properties:
                token:
                  type: string
                  description: Password reset token from email
                newPassword:
                  type: string
                  format: password
                  minLength: 8
      responses:
        '200':
          description: Password reset successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Password reset successfully
        '400':
          description: Invalid or expired token
        '500':
          $ref: '#/components/responses/InternalServerError'

  /auth/verify-email:
    post:
      tags:
        - Authentication
      summary: Verify email address
      description: Verify user's email address using the token from email.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - token
              properties:
                token:
                  type: string
                  description: Email verification token
      responses:
        '200':
          description: Email verified successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Email verified successfully
        '400':
          description: Invalid or expired token
        '409':
          description: Email already verified
        '500':
          $ref: '#/components/responses/InternalServerError'

  /auth/verify-email/resend:
    post:
      tags:
        - Authentication
      summary: Resend email verification
      description: Resend email verification link to the current user.
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Verification email sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Verification email sent
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          description: Email already verified
        '429':
          description: Too many verification requests
        '500':
          $ref: '#/components/responses/InternalServerError'

  # Orders API
  /orders:
    get:
      tags:
        - Orders
      summary: Get user orders
      description: Retrieve the current user's order history with pagination.
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          description: Page number for pagination
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          description: Number of orders per page
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 10
        - name: status
          in: query
          description: Filter by order status
          required: false
          schema:
            type: string
            enum: [pending, confirmed, processing, shipped, delivered, cancelled, refunded]
      responses:
        '200':
          description: Orders retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  orders:
                    type: array
                    items:
                      $ref: '#/components/schemas/Order'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /orders/{orderId}:
    get:
      tags:
        - Orders
      summary: Get order details
      description: Retrieve detailed information about a specific order.
      security:
        - BearerAuth: []
      parameters:
        - name: orderId
          in: path
          required: true
          description: Order ID
          schema:
            type: string
            example: order-123456
      responses:
        '200':
          description: Order details retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /orders/{orderId}/cancel:
    post:
      tags:
        - Orders
      summary: Cancel order
      description: Cancel an order if it hasn't been shipped yet.
      security:
        - BearerAuth: []
      parameters:
        - name: orderId
          in: path
          required: true
          description: Order ID
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                  maxLength: 500
                  description: Cancellation reason
      responses:
        '200':
          description: Order cancelled successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '400':
          description: Order cannot be cancelled
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # Guest Orders API
  /guest-orders/{orderId}:
    get:
      tags:
        - Orders
      summary: Get guest order details
      description: |
        Retrieve guest order details using order ID and email verification.
        This endpoint allows guest users to track their orders without creating an account.
      parameters:
        - name: orderId
          in: path
          required: true
          description: Guest order ID
          schema:
            type: string
        - name: email
          in: query
          required: true
          description: Email address used for the order
          schema:
            type: string
            format: email
      responses:
        '200':
          description: Guest order details retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          description: Order not found or email doesn't match
        '500':
          $ref: '#/components/responses/InternalServerError'

  # Payment Methods API
  /payment-methods:
    get:
      tags:
        - Payments
      summary: Get available payment methods
      description: Retrieve list of available payment methods and their configurations.
      responses:
        '200':
          description: Payment methods retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                      example: card
                    name:
                      type: string
                      example: Credit/Debit Card
                    type:
                      type: string
                      enum: [card, digital_wallet, bank_transfer]
                    supported:
                      type: array
                      items:
                        type: string
                      example: [visa, mastercard, amex]
                    fees:
                      type: number
                      description: Processing fee percentage
                      example: 0
        '500':
          $ref: '#/components/responses/InternalServerError'

  /payments:
    post:
      tags:
        - Payments
      summary: Process payment
      description: Process payment for an order (used internally by checkout process).
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - orderId
                - paymentMethod
                - amount
              properties:
                orderId:
                  type: string
                  description: Order ID to process payment for
                paymentMethod:
                  $ref: '#/components/schemas/PaymentMethod'
                amount:
                  type: number
                  description: Payment amount
                currency:
                  type: string
                  default: USD
                  example: USD
      responses:
        '200':
          description: Payment processed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  paymentId:
                    type: string
                    example: pay-123456
                  status:
                    type: string
                    enum: [succeeded, failed, pending]
                  amount:
                    type: number
                  currency:
                    type: string
                  method:
                    type: string
                  createdAt:
                    type: string
                    format: date-time
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '402':
          description: Payment failed
        '500':
          $ref: '#/components/responses/InternalServerError'


components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token for authenticated requests

  schemas:
    Product:
      type: object
      properties:
        id:
          type: string
          description: Unique product identifier
          example: black-tshirt
        name:
          type: string
          description: Product name
          example: Essential Black T-Shirt
        description:
          type: string
          description: Product description
          example: The perfect foundation for any wardrobe. Made from 100% organic cotton.
        price:
          type: number
          description: Current price
          example: 29.00
        originalPrice:
          type: number
          description: Original price before discount
          example: 39.00
        currency:
          type: string
          default: USD
          example: USD
        images:
          type: array
          items:
            type: string
            format: uri
          description: Product image URLs
          example: [https://cdn.minimal.com/products/black-tshirt-1.jpg]
        sizes:
          type: array
          items:
            type: string
          description: Available sizes
          example: [XS, S, M, L, XL, XXL]
        colors:
          type: array
          items:
            type: string
          description: Available colors
          example: [Black]
        category:
          type: string
          description: Product category
          example: clothing
        tags:
          type: array
          items:
            type: string
          description: Product tags
          example: [essential, cotton, basic]
        rating:
          type: number
          description: Average rating
          example: 4.8
        reviewCount:
          type: integer
          description: Number of reviews
          example: 127
        inStock:
          type: boolean
          description: Whether product is in stock
          example: true
        inventory:
          type: object
          additionalProperties:
            type: integer
          description: Inventory levels by size
          example:
            S: 15
            M: 20
            L: 18
        features:
          type: array
          items:
            type: string
          description: Product features
          example: [100% organic cotton, Pre-shrunk fabric]
        specifications:
          type: object
          additionalProperties:
            type: string
          description: Product specifications
          example:
            material: 100% Organic Cotton
            weight: 180 GSM
        createdAt:
          type: string
          format: date-time
          description: Product creation date
        updatedAt:
          type: string
          format: date-time
          description: Last update date

    Cart:
      type: object
      properties:
        id:
          type: string
          description: Cart ID
          example: cart-123456
        userId:
          type: string
          description: User ID (null for guest carts)
          example: user-123
        items:
          type: array
          items:
            $ref: '#/components/schemas/CartItem'
        subtotal:
          type: number
          description: Subtotal before tax and shipping
          example: 58.00
        tax:
          type: number
          description: Tax amount
          example: 4.64
        shipping:
          type: number
          description: Shipping cost
          example: 0.00
        discount:
          type: number
          description: Discount amount
          example: 0.00
        total:
          type: number
          description: Total amount
          example: 62.64
        currency:
          type: string
          default: USD
          example: USD
        coupon:
          type: object
          properties:
            code:
              type: string
            discount:
              type: number
            type:
              type: string
              enum: [percentage, fixed]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CartItem:
      type: object
      properties:
        id:
          type: string
          description: Cart item ID
          example: item-123
        productId:
          type: string
          description: Product ID
          example: black-tshirt
        name:
          type: string
          description: Product name
          example: Essential Black T-Shirt
        price:
          type: number
          description: Unit price
          example: 29.00
        image:
          type: string
          format: uri
          description: Product image URL
        size:
          type: string
          description: Selected size
          example: M
        quantity:
          type: integer
          description: Quantity
          example: 2
        addedAt:
          type: string
          format: date-time
          description: When item was added to cart

    Order:
      type: object
      properties:
        id:
          type: string
          description: Order ID
          example: order-123456
        orderId:
          type: string
          description: Human-readable order number
          example: MIN-2024-001234
        userId:
          type: string
          description: User ID (null for guest orders)
          example: user-123
        email:
          type: string
          format: email
          description: Order email
          example: customer@example.com
        status:
          type: string
          enum: [pending, confirmed, processing, shipped, delivered, cancelled, refunded]
          description: Order status
          example: confirmed
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItem'
        shippingAddress:
          $ref: '#/components/schemas/Address'
        billingAddress:
          $ref: '#/components/schemas/Address'
        paymentMethod:
          type: object
          properties:
            type:
              type: string
            last4:
              type: string
            brand:
              type: string
        subtotal:
          type: number
          example: 58.00
        tax:
          type: number
          example: 4.64
        shipping:
          type: number
          example: 0.00
        discount:
          type: number
          example: 0.00
        total:
          type: number
          example: 62.64
        currency:
          type: string
          default: USD
        shippingOption:
          $ref: '#/components/schemas/ShippingOption'
        trackingNumber:
          type: string
          description: Shipping tracking number
          example: TRK123456789
        estimatedDelivery:
          type: string
          format: date-time
          description: Estimated delivery date
        notes:
          type: string
          description: Special instructions
        guestOrder:
          type: boolean
          description: Whether this is a guest order
          example: false
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    OrderItem:
      type: object
      properties:
        id:
          type: string
          example: item-123
        productId:
          type: string
          example: black-tshirt
        name:
          type: string
          example: Essential Black T-Shirt
        price:
          type: number
          description: Price at time of order
          example: 29.00
        image:
          type: string
          format: uri
        size:
          type: string
          example: M
        quantity:
          type: integer
          example: 2

    User:
      type: object
      properties:
        id:
          type: string
          description: User ID
          example: user-123456
        email:
          type: string
          format: email
          description: User email
          example: user@example.com
        firstName:
          type: string
          description: First name
          example: John
        lastName:
          type: string
          description: Last name
          example: Doe
        phone:
          type: string
          description: Phone number
          example: +1234567890
        dateOfBirth:
          type: string
          format: date
          description: Date of birth
        emailVerified:
          type: boolean
          description: Whether email is verified
          example: true
        marketingOptIn:
          type: boolean
          description: Marketing communications opt-in
          example: false
        addresses:
          type: array
          items:
            $ref: '#/components/schemas/Address'
          description: Saved addresses
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Address:
      type: object
      required:
        - firstName
        - lastName
        - address
        - city
        - state
        - zipCode
        - country
      properties:
        id:
          type: string
          description: Address ID
          example: addr-123
        firstName:
          type: string
          maxLength: 50
          example: John
        lastName:
          type: string
          maxLength: 50
          example: Doe
        company:
          type: string
          maxLength: 100
          description: Company name (optional)
        address:
          type: string
          maxLength: 200
          example: 123 Main Street
        apartment:
          type: string
          maxLength: 50
          description: Apartment, suite, etc.
          example: Apt 4B
        city:
          type: string
          maxLength: 100
          example: New York
        state:
          type: string
          maxLength: 100
          example: NY
        zipCode:
          type: string
          maxLength: 20
          example: 10001
        country:
          type: string
          maxLength: 100
          example: United States
        phone:
          type: string
          maxLength: 20
          description: Phone number for delivery
        isDefault:
          type: boolean
          description: Whether this is the default address
          default: false

    PaymentMethod:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          enum: [card, paypal, apple_pay, google_pay]
          description: Payment method type
          example: card
        cardNumber:
          type: string
          description: Credit card number (required for card payments)
          example: 4111111111111111
        expiryDate:
          type: string
          description: Card expiry date MM/YY (required for card payments)
          example: 12/25
        cvv:
          type: string
          description: Card CVV (required for card payments)
          example: 123
        nameOnCard:
          type: string
          description: Name on card (required for card payments)
          example: John Doe
        saveCard:
          type: boolean
          description: Whether to save card for future use
          default: false

    ShippingOption:
      type: object
      properties:
        id:
          type: string
          description: Shipping option ID
          example: standard
        name:
          type: string
          description: Shipping option name
          example: Standard Shipping
        description:
          type: string
          description: Shipping description
          example: 5-7 business days
        price:
          type: number
          description: Shipping cost
          example: 5.99
        estimatedDays:
          type: integer
          description: Estimated delivery days
          example: 7
        carrier:
          type: string
          description: Shipping carrier
          example: USPS

    Review:
      type: object
      properties:
        id:
          type: string
          description: Review ID
          example: review-123
        userId:
          type: string
          description: User ID
          example: user-123
        userName:
          type: string
          description: Reviewer name
          example: John D.
        rating:
          type: integer
          minimum: 1
          maximum: 5
          description: Rating from 1 to 5 stars
          example: 5
        title:
          type: string
          description: Review title
          example: Perfect fit and quality
        comment:
          type: string
          description: Review comment
          example: Exactly what I was looking for. Great quality cotton.
        verified:
          type: boolean
          description: Whether this is a verified purchase
          example: true
        helpful:
          type: integer
          description: Number of helpful votes
          example: 12
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ReviewSummary:
      type: object
      properties:
        averageRating:
          type: number
          description: Average rating
          example: 4.8
        totalReviews:
          type: integer
          description: Total number of reviews
          example: 127
        ratingDistribution:
          type: object
          properties:
            '5':
              type: integer
              example: 89
            '4':
              type: integer
              example: 28
            '3':
              type: integer
              example: 7
            '2':
              type: integer
              example: 2
            '1':
              type: integer
              example: 1

    Pagination:
      type: object
      properties:
        page:
          type: integer
          description: Current page number
          example: 1
        limit:
          type: integer
          description: Items per page
          example: 10
        total:
          type: integer
          description: Total number of items
          example: 127
        pages:
          type: integer
          description: Total number of pages
          example: 13

    Error:
      type: object
      properties:
        error:
          type: string
          description: Error type
          example: ValidationError
        message:
          type: string
          description: Error message
          example: Invalid input data
        details:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              message:
                type: string
          description: Detailed error information
        timestamp:
          type: string
          format: date-time
          description: Error timestamp
        requestId:
          type: string
          description: Request ID for tracking
          example: req-123456

  responses:
    BadRequest:
      description: Bad request - invalid input data
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: ValidationError
            message: Invalid input data
            details:
              - field: email
                message: Invalid email format
            timestamp: 2024-01-15T10:30:00Z
            requestId: req-123456

    Unauthorized:
      description: Unauthorized - authentication required
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: AuthenticationError
            message: Authentication required
            timestamp: 2024-01-15T10:30:00Z
            requestId: req-123456

    Forbidden:
      description: Forbidden - insufficient permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: AuthorizationError
            message: Insufficient permissions
            timestamp: 2024-01-15T10:30:00Z
            requestId: req-123456

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: NotFoundError
            message: Resource not found
            timestamp: 2024-01-15T10:30:00Z
            requestId: req-123456

    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: InternalServerError
            message: An unexpected error occurred
            timestamp: 2024-01-15T10:30:00Z
            requestId: req-123456

tags:
  - name: Products
    description: Product catalog operations
  - name: Cart
    description: Shopping cart management
  - name: Checkout
    description: Order processing and checkout
  - name: Authentication
    description: User authentication and profile management
  - name: Orders
    description: Order management and tracking
  - name: Payments
    description: Payment processing

